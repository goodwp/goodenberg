name: Build examples plugin

on:
    release:
        types: [published]

permissions:
    # Required for action-gh-release
    contents: write

jobs:
    build_and_package:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - name: Setup Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: ".nvmrc"

            - name: Install library npm dependencies
              run: npm ci

            - name: Build library dist files
              run: npm run build

            - name: Install all npm packages
              working-directory: examples
              run: npm ci

            - name: Setup PHP and tools
              uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2.37.1
              with:
                  php-version: 8.3
                  tools: composer:v2

            - name: Install Composer dependencies
              uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # v4.0.0
              with:
                  composer-options: "--prefer-dist --no-progress"

            - name: Build files
              working-directory: examples
              run: npm run build

            - name: Build plugin zip file
              working-directory: examples
              run: npm run plugin-zip

            - name: Upload dist archive to release
              uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
              with:
                  files: examples/goodenberg-examples.zip
